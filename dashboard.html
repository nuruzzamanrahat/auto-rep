const Auth = {
    async getSession() { const { data: { session } } = await db.auth.getSession(); return session; },
    async getProfile(userId) { const { data, error } = await db.from('profiles').select('*').eq('id', userId).single(); if (error) throw error; return data; },
    async requireAuth(redirectTo = 'index.html') { const session = await this.getSession(); if (!session) { window.location.href = redirectTo; return null; } return session; },
    async logout() { await db.auth.signOut(); window.location.href = 'index.html'; }
};

const UI = {
    showToast(msg, type='info', dur=3000) {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `toast toast-${type}`;
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(()=>t.remove(), dur);
    }
};

// ── NEW STYLED REPORT GENERATOR ─────────────────────────────────
const ReportGenerator = {

    async _loadImg(src) {
        return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth || img.width;
                canvas.height = img.naturalHeight || img.height;
                canvas.getContext('2d').drawImage(img, 0, 0);
                resolve(canvas.toDataURL('image/png'));
            };
            img.onerror = () => resolve(null);
            img.src = src;
        });
    },

    async generate(formData) {
        const fd = formData || {};
        UI.showToast('Generating PDF…', 'info', 15000);
        try {
            const { jsPDF } = window.jspdf;
            const PW = 210, PH = 297;
            const IMG_H = 22;
            const MT = 30, MB = 20;
            const ML = 16, MR = 16;
            const CW = PW - ML - MR;
            const CONTENT_BOTTOM = PH - MB;

            const headerImg = await this._loadImg('AMK Header.png');
            const footerImg = await this._loadImg('AKM Footer.png');

            const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });

            const v  = (k, fb='') => { const val = fd[k]; return (val===undefined||val===null||val==='') ? fb : String(val); };
            const ar = (k) => Array.isArray(fd[k]) ? fd[k].join(', ') : (fd[k] || '\u2014');
            const dt = (k) => { const s = fd[k]; if(!s) return '\u2014'; try { return new Date(s).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); } catch(e){return s;} };

            const drawHeaderFooter = () => {
                if (headerImg) { try { doc.addImage(headerImg, 'PNG', 0, 0, PW, IMG_H); } catch(e) {} }
                if (footerImg) { try { doc.addImage(footerImg, 'PNG', 0, PH - IMG_H, PW, IMG_H); } catch(e) {} }
            };

            const newPage = () => { doc.addPage(); drawHeaderFooter(); return MT; };

            const sectionBar = (y, text) => {
                doc.setDrawColor(0,0,0); doc.setFillColor(255,255,255);
                doc.rect(ML, y, CW, 7, 'FD');
                doc.setFont('times','bold'); doc.setFontSize(10); doc.setTextColor(0,0,0);
                doc.text(text.toUpperCase(), ML+2, y+5); return y + 9;
            };

            const tRow = (y, label, value) => {
                const rowH = 6, col1 = 74, col2 = CW - col1 - 4;
                if (y + rowH > CONTENT_BOTTOM) { y = newPage(); }
                doc.setDrawColor(0,0,0); doc.setFillColor(240,240,240);
                doc.rect(ML, y, col1, rowH, 'FD'); doc.setFillColor(255,255,255);
                doc.rect(ML+col1, y, 4, rowH, 'FD'); doc.rect(ML+col1+4, y, col2, rowH, 'FD');
                doc.setFont('times','bold'); doc.setFontSize(10); doc.setTextColor(0,0,0);
                doc.text(String(label), ML+1.5, y+4); doc.setFont('times','normal');
                doc.text(':', ML+col1+1.2, y+4);
                const lines = doc.splitTextToSize(String(value||'\u2014'), col2-3);
                doc.text(lines[0], ML+col1+5.5, y+4); return y + rowH;
            };

            const checkRow = (y, rowLabel, options) => {
                const rowH = 7, col1 = 74, colonW = 4, boxSz = 3.2;
                if (y + rowH > CONTENT_BOTTOM) { y = newPage(); }
                doc.setDrawColor(0,0,0); doc.setFillColor(240,240,240);
                doc.rect(ML, y, col1, rowH, 'FD');
                doc.setFont('times','bold'); doc.setFontSize(10); doc.setTextColor(0,0,0);
                doc.text(String(rowLabel), ML+1.5, y + rowH/2 + 1.2);
                doc.setFillColor(255,255,255); doc.rect(ML+col1, y, colonW, rowH, 'FD');
                doc.setFont('times','normal'); doc.setFontSize(10);
                doc.text(':', ML+col1+1.2, y + rowH/2 + 1.2);
                const checkAreaW = CW - col1 - colonW;
                doc.setFillColor(255,255,255); doc.rect(ML+col1+colonW, y, checkAreaW, rowH, 'FD');
                const optW = checkAreaW / options.length;
                options.forEach((opt, i) => {
                    const ox = ML + col1 + colonW + i * optW + 2, oy = y + (rowH - boxSz) / 2;
                    doc.setDrawColor(0,0,0); doc.setFillColor(255,255,255);
                    doc.rect(ox, oy, boxSz, boxSz, 'FD');
                    if (opt.checked) {
                        doc.setDrawColor(0,0,0); doc.setLineWidth(0.5);
                        doc.line(ox + 0.5,         oy + boxSz*0.6,  ox + boxSz*0.38, oy + boxSz - 0.4);
                        doc.line(ox + boxSz*0.38,  oy + boxSz - 0.4, ox + boxSz - 0.3, oy + 0.4);
                        doc.setLineWidth(0.2);
                    }
                    doc.setFont('times','normal'); doc.setFontSize(10); doc.setTextColor(0,0,0);
                    doc.text(String(opt.label), ox + boxSz + 1.2, oy + boxSz - 0.4);
                });
                return y + rowH;
            };

            const buildOpts = (field, optLabels) => {
                const raw = fd[field];
                const saved = Array.isArray(raw) ? raw : (raw ? [raw] : []);
                return optLabels.map(l => ({ label: l, checked: saved.includes(l) }));
            };

            drawHeaderFooter();
            let y = MT;

            // PAGE 1: COVER — styled to match reference image
            const titleY = 110;
            doc.setFont('times','bold'); doc.setFontSize(16); doc.setTextColor(0,0,0);
            doc.text('INSPECTION & VALUATION REPORT OF', PW/2, titleY, {align:'center'});
            doc.text('USED/PRE-OWNED VEHICLE', PW/2, titleY + 10, {align:'center'});

            let ry = titleY + 30;
            const refData = [
                ['Reference Account Name', v('reference_account_name')],
                ['File Reference Number',  v('file_reference_number')],
                ['Referred By',            v('referred_by')],
                ['Date of Inspection',     dt('date_of_inspection')]
            ];
            const refLabelW = 52, refColonW = 4, refValueW = 60;
            const refBlockW = refLabelW + refColonW + refValueW;
            const refStartX = (PW - refBlockW) / 2;
            refData.forEach(([lbl, val]) => {
                doc.setFont('times','bold'); doc.setFontSize(10); doc.setTextColor(0,0,0);
                doc.text(lbl, refStartX, ry);
                doc.text(':', refStartX + refLabelW, ry);
                doc.text(String(val), refStartX + refLabelW + refColonW + 1, ry);
                ry += 6;
            });

            const boxTop = 220;
            const rNameLines = doc.splitTextToSize(v('recipient_name'), CW/2-14);
            const addrL = doc.splitTextToSize(v('recipient_address'), CW/2-14);
            const toRows = rNameLines.length + addrL.length;
            const boxH = Math.max(40, 14 + Math.max(6, toRows) * 5.5);
            doc.setDrawColor(0,0,0); doc.setFillColor(255,255,255);
            doc.rect(ML, boxTop, CW/2-2, boxH, 'FD'); doc.rect(ML+CW/2+2, boxTop, CW/2-2, boxH, 'FD');

            let by = boxTop + 6;
            doc.setFont('times','bold'); doc.setFontSize(10); doc.text('Submitted by:', ML+3, by); by += 6;
            doc.setFont('times','bold'); doc.text('AMK Associates Limited', ML+3, by); by += 5.5;
            doc.setFont('times','normal'); doc.setFontSize(10);
            doc.text('68, Khilgaon Chowdhury Para (4th floor)', ML+3, by); by += 5;
            doc.text('DIT Road Rampura, Dhaka-1219', ML+3, by); by += 5;
            doc.text('E-mail: www.amkassociatesbd@gmail.com', ML+3, by); by += 5;
            doc.text('Web: www.amkassociatesbd.com', ML+3, by); by += 5;
            doc.text('Contact: 01841132714', ML+3, by);

            const rx = ML + CW/2 + 5;
            let ty = boxTop + 6;
            doc.setFont('times','bold'); doc.setFontSize(10); doc.text('Submitted to:', rx, ty); ty += 6;
            rNameLines.forEach(line => { doc.text(line, rx, ty); ty += 5.5; });
            doc.setFont('times','normal'); doc.setFontSize(10);
            addrL.forEach(line => { doc.text(line, rx, ty); ty += 5; });

            // PAGE 2: COVER LETTER
            y = newPage();
            doc.setFont('times','normal'); doc.setFontSize(10);
            // Fix 3: Date immediately after Ref (on next line, not right-aligned same line)
            doc.text('Ref.: ' + v('letter_ref'), ML, y); y += 6;
            doc.text('Date: ' + dt('letter_date'), ML, y); y += 9;
            doc.setFont('times','bold'); doc.text(v('recipient_name'), ML, y); y += 6;
            doc.setFont('times','normal');
            const addrLines2 = doc.splitTextToSize(v('recipient_address'), CW);
            doc.text(addrLines2, ML, y); y += addrLines2.length*5+5;
            doc.setFont('times','bold'); doc.text('Re: Inspection & Valuation Report of used/pre-owned vehicle', ML, y); y += 8;
            doc.setFont('times','normal'); doc.text('Dear Sir,', ML, y); y += 7;
            doc.text('Greetings from AMK Associates Limited and Thank You very much for referring us!', ML, y, {maxWidth:CW}); y += 11;
            const body = 'Pursuant to your communication through ' + v('comm_medium') + ', dated: ' + dt('comm_date') + ' by ' + v('comm_person') + ', we, AMK Associates Limited has conducted the inspection and valuation of the referred vehicle, summary of which is as per following:';
            const bodyL = doc.splitTextToSize(body, CW);
            doc.text(bodyL, ML, y); y += bodyL.length*5+7;
            doc.setFont('times','italic'); doc.setFontSize(10); doc.setTextColor(0,0,0);
            doc.text('Amount in BDT', ML + CW, y, {align:'right'}); y += 4;
            const col3W = CW / 3;
            const hdrH = 16;
            doc.setDrawColor(0,0,0); doc.setFillColor(255,255,255);
            doc.rect(ML, y, col3W, hdrH, 'FD'); doc.rect(ML+col3W, y, col3W, hdrH, 'FD'); doc.rect(ML+col3W*2, y, col3W, hdrH, 'FD');
            doc.setFont('times','bold'); doc.setFontSize(10); doc.setTextColor(0,0,0);
            doc.text('Maximum Price',        ML+col3W*0.5, y+7,  {align:'center'});
            doc.text('Assessed Price',       ML+col3W*1.5, y+7,  {align:'center'});
            doc.text('Forced Sale Value on', ML+col3W*2.5, y+4,  {align:'center'});
            doc.text('Assessed Price',       ML+col3W*2.5, y+9,  {align:'center'});
            doc.text('(20% Depreciation)',   ML+col3W*2.5, y+14, {align:'center'});
            y += hdrH;
            const valH = 10;
            doc.setFillColor(255,255,255);
            doc.rect(ML, y, col3W, valH, 'FD'); doc.rect(ML+col3W, y, col3W, valH, 'FD'); doc.rect(ML+col3W*2, y, col3W, valH, 'FD');
            doc.setFont('times','normal'); doc.setFontSize(10); doc.setTextColor(0,0,0);
            doc.text(v('max_price','\u2014'),         ML+col3W*0.5, y+6.5, {align:'center'});
            doc.text(v('assessed_price','\u2014'),    ML+col3W*1.5, y+6.5, {align:'center'});
            doc.text(v('forced_sale_value','\u2014'), ML+col3W*2.5, y+6.5, {align:'center'});
            y += valH + 8;
            doc.setFont('times','normal'); doc.setFontSize(10);
            const closingL = doc.splitTextToSize('As per our understanding, the aforementioned valuation is fair and reasonable and our responsibility is restricted within the physical existence of the used vehicle and the value thereof.', CW);
            doc.text(closingL, ML, y); y += closingL.length*5+6;
            const closing2L = doc.splitTextToSize('The report has been prepared based on our physical inspection, verification, necessary documents as provided by concern office/individual, local market analysis and assessment to the best of our knowledge.\n\nFor any query, please feel free to contact us.', CW);
            doc.text(closing2L, ML, y); y += closing2L.length*5+10;
            doc.text('With best regards,', ML, y); y += 24;
            doc.setDrawColor(0,0,0);
            doc.line(ML, y, ML+78, y); doc.line(ML+100, y, ML+178, y); y += 5;
            doc.setFont('times','bold'); doc.setFontSize(10);
            doc.text(v('valuer_1_name'), ML, y); doc.text(v('valuer_2_name'), ML+100, y); y += 6;
            doc.setFont('times','normal'); doc.setFontSize(10);
            doc.text(v('valuer_1_designation'), ML, y); doc.text(v('valuer_2_designation'), ML+100, y);
            y += 12;
            // Fix 3: Enclosure section at bottom of cover letter page
            doc.setFont('times','italic'); doc.setFontSize(10); doc.setTextColor(0,0,0);
            doc.text('Encl:', ML, y);
            ['1. Annexure-I   : Detail Report',
             '2. Annexure-II  : Registration Acknowledgement Slip Verification Report',
             '3. Annexure-III : Photograph of Vehicle',
             '4. Annexure-IV  : QR Code for Video of Vehicle',
            ].forEach((line, i) => { doc.text(line, ML + 16, y + i * 5.5); });

            // PAGE 3: VEHICLE & REGISTRATION
            y = newPage();
            doc.setFont('times','italic'); doc.setFontSize(10); doc.setTextColor(0,0,0);
            doc.text('Annexure-I', ML + CW, y, {align:'right'}); y += 7;
            doc.setFont('times','bold'); doc.setFontSize(12);
            doc.text('Detail Report', PW/2, y, {align:'center'}); y += 10;
            doc.setFont('times','normal'); doc.setFontSize(10);
            y = sectionBar(y, 'Vehicle Details');
            [['Manufacturing Company',v('manufacturer')],['Trim / Package',v('trim_package')],
             ['Vehicle Model',v('vehicle_model')],['Country of Origin',v('country_of_origin')],
             ['Engine Number',v('engine_number')],['Chassis Number',v('chassis_number')],
             ['Manufacturing Year',v('manufacturing_year')],['Cubic Capacity (CC)',v('cubic_capacity')],
             ['Color',v('color')]
            ].forEach(([l,val])=>{ y = tRow(y,l,val); });
            y = checkRow(y, 'Type of Vehicle', buildOpts('vehicle_type', ['Non-Hybrid','Hybrid','Electric']));
            y = checkRow(y, 'Fuel Used', buildOpts('fuel_used', ['Petrol','Diesel','CNG','Octane','Electric']));
            y += 5; if (y + 10 > CONTENT_BOTTOM) y = newPage();
            y = sectionBar(y, 'Registration Details');
            [['Current Owner Name',v('owner_name')],['Registration Number',v('registration_number')],
             ['Registration ID',v('registration_id')],['Registration Date',dt('registration_date')],
             ['Ownership Transfer Status',v('ownership_transfer')],['Insurance Policy Number & Date',v('insurance_policy')],
             ['Tax Clearance Certificate Number',v('tax_clearance_number')],['Tax Clearance Up To',dt('tax_clearance_date')],
             ['Fitness Certificate Number',v('fitness_cert_number')],['Fitness Validity Up To',dt('fitness_validity')]
            ].forEach(([l,val])=>{ y = tRow(y,l,val); });
            y = checkRow(y, 'Hire Purchase', buildOpts('hire_purchase', ['Yes','No']));

            // PAGE 4: INSPECTION
            y = newPage();
            y = sectionBar(y, 'Interior Inspection');
            [['Transmission (Gear)','transmission',['Auto','Manual']],['Ignition (Start)','ignition',['Push','Key']],
             ['Power Window','power_window',['Auto','Manual']],['Power Steering','power_steering',['Auto','Manual']],
             ['Power Side Mirror','power_side_mirror',['Auto','Manual']],['Power Door Locks','power_door_locks',['Yes','No']],
             ['Sound System','sound_system',['Built-in','Modified']],['Wooden Panel','wooden_panel',['Yes','No']],
             ['Leather Interior','leather_interior',['Yes','No']],['Airbag','airbag',['Yes','No']],
             ['Back Camera','back_camera',['Yes','No']],
             ['Ambient Lighting','ambient_lighting',['Built-in','Modified']],
            ].forEach(([lbl,field,opts]) => { y = checkRow(y, lbl, buildOpts(field, opts)); });
            y = checkRow(y, 'Additional Accessories', buildOpts('interior_accessories_yn', ['Yes','No']));
            if (fd['interior_accessories_yn'] === 'Yes' || (Array.isArray(fd['interior_accessories_yn']) && fd['interior_accessories_yn'].includes('Yes'))) {
                y = tRow(y, 'Accessories Detail', v('interior_accessories'));
            }
            y = tRow(y, 'No. of Seats', v('num_seats'));
            y = tRow(y, 'Total Mileage (as per Dashboard)', v('total_mileage'));
            y += 5; if (y + 10 > CONTENT_BOTTOM) y = newPage();
            y = sectionBar(y, 'Exterior Inspection');
            [['Body Condition','body_condition',['Good','Fair','Moderate','Poor']],
             ['Engine Condition','engine_condition',['Good','Fair','Moderate','Poor']],
             ['Tires Condition','tires_condition',['Good','Fair','Moderate','Poor']],
             ['Major Defects','major_defects',['Yes','No']],['Chassis Repaired','chassis_repaired',['Yes','No']],
             ['Alloy Rim','alloy_rim',['Built-in','Modified']],['Sun Roof/Moon Roof','sun_roof',['Yes','No']],
             ['Glass','glass',['Original','Repaired']],['Fog Light','fog_light',['Yes','No']],
             ['Dimension','dimension',['Long','Hatchback','Saloon','SUV']],
             ['Paint Condition','paint_condition',['Good','Fair','Moderate','Poor']],
            ].forEach(([lbl,field,opts]) => { y = checkRow(y, lbl, buildOpts(field, opts)); });
            y = checkRow(y, 'Major Accidental History', buildOpts('accidental_history', ['Yes','No']));
            if (fd['accidental_history'] === 'Yes' || (Array.isArray(fd['accidental_history']) && fd['accidental_history'].includes('Yes'))) {
                y = tRow(y, 'Accidental History Detail', v('accidental_history_detail'));
            }
            y = checkRow(y, 'HID Lights', buildOpts('hid_lights', ['Good','Fair','Moderate','Poor']));
            y = checkRow(y, 'Additional Accessories', buildOpts('exterior_accessories_yn', ['Yes','No']));
            if (fd['exterior_accessories_yn'] === 'Yes' || (Array.isArray(fd['exterior_accessories_yn']) && fd['exterior_accessories_yn'].includes('Yes'))) {
                y = tRow(y, 'Accessories Detail', v('exterior_accessories'));
            }

            // PAGE 5: ASSESSMENT + DISCLAIMER
            y = newPage();
            y = sectionBar(y, 'Overall Assessment');
            [['Interior Condition','interior_condition',['Good','Average','Poor']],
             ['Exterior Condition','exterior_condition',['Good','Average','Poor']],
             ['Any Known Defects','known_defects',['Yes','No']],
            ].forEach(([lbl,field,opts]) => { y = checkRow(y, lbl, buildOpts(field, opts)); });
            if (fd['known_defects'] === 'Yes' || (Array.isArray(fd['known_defects']) && fd['known_defects'].includes('Yes'))) {
                y = tRow(y, 'Known Defects Detail', v('known_defects_detail'));
            }
            y += 5; if (y + 10 > CONTENT_BOTTOM) y = newPage();
            y = sectionBar(y, 'Inspection Particulars');
            [['Date of Inspection',dt('inspection_date')],['Inspection Time',(()=>{ const t=v('inspection_time'); if(!t||!t.includes(':')) return t||'—'; const [h,m]=t.split(':'); const hr=parseInt(h); return (hr%12||12)+':'+m+(hr<12?' AM':' PM'); })()],
             ['Location',v('inspection_location')],['Contact Person Presented',v('contact_person')],
             ['Name of Verification Agent',v('verification_agent')]
            ].forEach(([l,val])=>{ y = tRow(y,l,val); });
            y += 6; if (y + 10 > CONTENT_BOTTOM) y = newPage();
            y = sectionBar(y, 'Declaration');
            y += 2;
            doc.setFont('times','normal'); doc.setFontSize(10); doc.setTextColor(0,0,0);
            ['The valuation has been performed based on our physical inspection, verification, local market analysis and assessment to the best of our knowledge.',
             "AMK's responsibility is limited to the valuation of the said vehicle only without considering any legal matter related to the vehicle and documents.",
             'Except inspection and valuation of the said vehicle, AMK or any of its Officials has no interest directly or indirectly in any manner whatsoever in the subject matter of this report.',
             "In case of Forced Sale Value, the rate is assumed on the basis of the vehicle's demand, price, marketability and other factors.",
             'This report is not intended to absolve the concerned parties from their contractual obligations.'
            ].forEach((d,i) => {
                const lines = doc.splitTextToSize((i+1) + '. ' + d, CW-4);
                if (y + lines.length*5 > CONTENT_BOTTOM) y = newPage();
                doc.text(lines, ML+2, y); y += lines.length*5 + 2;
            });

            // PAGE 6: ANNEXURE-II — Registration Details Report
            y = newPage();
            doc.setFont('times','italic'); doc.setFontSize(10); doc.setTextColor(0,0,0);
            doc.text('Annexure-II', ML + CW, y, {align:'right'}); y += 7;
            doc.setFont('times','bold'); doc.setFontSize(12); doc.setTextColor(0,0,0);
            doc.text('Registration Details Report', PW/2, y, {align:'center'}); y += 8;
            doc.setFont('times','normal'); doc.setFontSize(10);
            const rh = 8; // base row height
            // CW/3 grid used for ALL 3 tables — vertical lines at ML, ML+C3, ML+2*C3, ML+CW
            const C3 = Math.floor(CW / 3), C3r = CW - C3*2;
            const FS = 9; // font size for table content (smaller to prevent overflow)
            doc.setFontSize(FS);

            // ── smart lv: auto-height cell pair, returns actual height used ──
            const lvH = (x, cy, lw, vw, h, label, val) => {
                const lblLines = doc.splitTextToSize(label, lw-2);
                const valLines = doc.splitTextToSize(val||'', vw-2);
                const needed = Math.max(lblLines.length, valLines.length) * 4.5 + 3;
                const ch = Math.max(h, needed);
                doc.setDrawColor(0,0,0); doc.setLineWidth(0.2);
                doc.rect(x, cy, lw, ch);
                doc.setFont('times','bold'); doc.setFontSize(FS);
                doc.text(lblLines, x+1.5, cy+4);
                doc.rect(x+lw, cy, vw, ch);
                doc.setFont('times','normal'); doc.setFontSize(FS);
                doc.text(valLines, x+lw+1.5, cy+4);
                return ch;
            };
            // ── row of 3 cells, returns max height ──
            const row3 = (lw, pairs, minH) => {
                const colWs = [C3, C3, C3r];
                // calculate max height needed across all 3 cells
                let maxH = minH;
                pairs.forEach(([lbl, val], i) => {
                    const vw = colWs[i] - lw;
                    const lblL = doc.splitTextToSize(lbl, lw-2).length;
                    const valL = doc.splitTextToSize(val||'', vw-2).length;
                    const needed = Math.max(lblL, valL) * 4.5 + 3;
                    if (needed > maxH) maxH = needed;
                });
                let x = ML;
                pairs.forEach(([lbl, val], i) => {
                    lvH(x, y, lw, colWs[i]-lw, maxH, lbl, val);
                    x += colWs[i];
                });
                return maxH;
            };
            // ── hdr: full-width header ──
            const hdr = (w, label) => {
                doc.setDrawColor(0,0,0); doc.setLineWidth(0.2);
                doc.rect(ML, y, w, rh);
                doc.setFont('times','bold'); doc.setFontSize(FS);
                doc.text(label, ML+1.5, y+5);
            };
            const LW1 = 22; // label width for Table 1 (3-col)
            const LW2 = 24; // label width for Tables 2 & 3

            // ════ TABLE 1: Registration Info — 3-column grid ════
            // Header row: [Registration Info — 2 cols] [Current Authority lbl | val — 1 col]
            hdr(CW, 'Registration Info');
            // draw Current Authority on right side of header row
            doc.setDrawColor(0,0,0); doc.setLineWidth(0.2);
            doc.rect(ML+C3*2, y, LW1, rh);
            doc.setFont('times','bold'); doc.setFontSize(FS);
            doc.text('Current\nAuthority', ML+C3*2+1.5, y+2.5);
            doc.rect(ML+C3*2+LW1, y, C3r-LW1, rh);
            doc.setFont('times','normal'); doc.setFontSize(FS);
            doc.text(doc.splitTextToSize(v('brta_authority'), C3r-LW1-2), ML+C3*2+LW1+1.5, y+3.5);
            // override outer rect with full-width for left label
            doc.setFont('times','bold'); doc.setFontSize(FS);
            doc.text('Registration Info', ML+1.5, y+5);
            y += rh;

            // Row 1: Reg Id | val | Reg No | val | Prev Reg No | val
            let h1 = row3(LW1, [
                ['Registration\nId',  v('brta_registration_id')],
                ['Registration\nNo',  v('brta_registration_no')],
                ['Previous\nReg No',  v('brta_prev_reg_no')]
            ], rh*2); y += h1;

            // Row 2: App Status | val | Reg Date | val | Hire | val
            let h2 = row3(LW1, [
                ['Application\nStatus', v('brta_app_status')],
                ['Registration\nDate',  dt('brta_reg_date')],
                ['Hire',                v('brta_hire')]
            ], rh*2); y += h2;

            // Row 3: Ownership Type | val | Hire Purchase | val | Bank Name | val
            let h3 = row3(LW1, [
                ['Ownership\nType',  v('brta_ownership_type')],
                ['Hire\nPurchase',   v('brta_hire_purchase')],
                ['Bank Name',        v('brta_bank_name')]
            ], rh*2); y += h3;

            // Row 4: Bank Address (full width)
            const baLines = doc.splitTextToSize(v('brta_bank_address')||'', CW - LW1 - 2);
            const baH = Math.max(rh, baLines.length * 4.5 + 3);
            doc.setDrawColor(0,0,0); doc.setLineWidth(0.2);
            doc.rect(ML, y, LW1, baH);
            doc.setFont('times','bold'); doc.setFontSize(FS);
            doc.text('Bank Address', ML+1.5, y+4);
            doc.rect(ML+LW1, y, CW-LW1, baH);
            doc.setFont('times','normal'); doc.setFontSize(FS);
            doc.text(baLines, ML+LW1+1.5, y+4);
            y += baH + 4;

            // ════ TABLE 2: Vehicle Info — 3-column grid ════
            hdr(CW, 'Vehicle Info'); y += rh;

            y += row3(LW2, [['Chassis No', v('brta_chassis_no')],['Engine No', v('brta_engine_no')],['Manufacture\nYear', v('brta_mfg_year')]], rh*2);
            y += row3(LW2, [['Vehicle Class', v('brta_veh_class')],['Vehicle Type', v('brta_veh_type')],['No of Seat', v('brta_num_seats')]], rh*2);
            y += row3(LW2, [['Manufacturer', v('brta_manufacturer')],["Maker's\nCountry", v('brta_country')],['Color', v('brta_color')]], rh*2);
            y += row3(LW2, [['Horse Power', v('brta_hp')],['RPM', v('brta_rpm')],['CC', v('brta_cc')]], rh);
            y += row3(LW2, [['Unladen\nWeight', v('brta_unladen_weight')],['Max Weight', v('brta_max_weight')],['No of\nCylinders', v('brta_cylinders')]], rh);
            // Vehicle Model | Mileage | empty
            let x3 = ML;
            lvH(x3, y, LW2, C3-LW2, rh, 'Vehicle Model', v('brta_vehicle_model')); x3 += C3;
            lvH(x3, y, LW2, C3-LW2, rh, 'Mileage', v('brta_mileage')); x3 += C3;
            doc.setDrawColor(0,0,0); doc.setLineWidth(0.2); doc.rect(x3, y, C3r, rh);
            y += rh + 4;

            // ════ TABLE 3: Owner Info — 3-column grid ════
            const LW3 = 22;
            hdr(CW, 'Owner Info'); y += rh;
            let ownerIdx = 1;
            while (fd['owner_' + ownerIdx + '_name'] || ownerIdx === 1) {
                const oName   = v('owner_' + ownerIdx + '_name');
                const oFather = v('owner_' + ownerIdx + '_father');
                const oAddr   = v('owner_' + ownerIdx + '_address');
                if (!oName && ownerIdx > 1) break;
                y += row3(LW3, [["Owner's\nName", oName],["Father's\nName", oFather],["Owner's\nAddress", oAddr]], rh*2);
                ownerIdx++;
                if (y + rh*2 > CONTENT_BOTTOM) { y = newPage(); }
            }
            y += 5;

            // PHOTOS
            const photos = Array.isArray(fd._photos) && fd._photos.length > 0 ? fd._photos : [];
            if (photos.length > 0) {
                const imgW = 158, imgH = 102, capH = 6, gapY = 8, perPage = 2;
                for (let i = 0; i < photos.length; i++) {
                    if (i % perPage === 0) {
                        y = newPage();
                        doc.setFont('times','bold'); doc.setFontSize(11); doc.setTextColor(0,0,0);
                        const pageLabel = 'Annexure-III: Photograph of Vehicle';
                        doc.text(pageLabel, PW/2, y+5, {align:'center'}); y += 14;
                    }
                    const slotOnPage = i % perPage;
                    const iy = y + slotOnPage * (imgH + capH + gapY);
                    const imgX = ML + (CW - imgW) / 2;
                    try {
                        const fmt = photos[i].dataUrl.startsWith('data:image/png') ? 'PNG' : 'JPEG';
                        doc.addImage(photos[i].dataUrl, fmt, imgX, iy, imgW, imgH);
                    } catch(e) { doc.setFillColor(240,240,240); doc.rect(imgX, iy, imgW, imgH, 'FD'); }
                    doc.setDrawColor(0,0,0); doc.setLineWidth(0.4); doc.rect(imgX, iy, imgW, imgH); doc.setLineWidth(0.2);
                    const rawCaption = photos[i].caption || photos[i].name.replace(/\.[^/.]+$/, '');
                    const nm = rawCaption.length > 50 ? rawCaption.slice(0, 48) + '...' : rawCaption;
                    doc.setFont('times','normal'); doc.setFontSize(10); doc.setTextColor(0,0,0);
                    doc.text(nm, PW/2, iy + imgH + 4.5, {align:'center'});
                }
            }

            // QR PAGE
            const qr = fd._qr;
            if (qr) {
                y = newPage();
                doc.setFont('times','bold'); doc.setFontSize(12); doc.setTextColor(0,0,0);
                doc.text('Annexure-IV: QR Code for Video of Vehicle', PW/2, y+5, {align:'center'}); y += 14;
                doc.setFont('times','bold'); doc.setFontSize(10);
                doc.text(v('qr_label','Document QR Code'), PW/2, y, {align:'center'}); y += 10;
                const qrSize = 60, qrX = (PW - qrSize) / 2;
                try { const qrFmt = qr.dataUrl.startsWith('data:image/png') ? 'PNG':'JPEG'; doc.addImage(qr.dataUrl, qrFmt, qrX, y, qrSize, qrSize); }
                catch(e){ doc.setDrawColor(0,0,0); doc.rect(qrX, y, qrSize, qrSize); }
                y += qrSize + 6;
                if(fd.qr_url){ doc.setFont('times','normal'); doc.setFontSize(10); doc.setTextColor(0,0,0); doc.text(fd.qr_url, PW/2, y, {align:'center', maxWidth:CW}); y += 8; }
                y += 6;
                doc.setDrawColor(180,180,180); doc.setLineWidth(0.3);
                doc.line(ML, y, ML+CW, y); doc.setLineWidth(0.2); doc.setDrawColor(0,0,0);
                y += 7;
                doc.setFont('times','bold'); doc.setFontSize(10); doc.setTextColor(0,0,0);
                doc.text('Instructions for use:', ML, y); y += 7;
                const bullets = [
                    'Download & install any QR code scanner/reader.',
                    'Scan the attached QR code.',
                    'Open the link using Google chrome/any browser.',
                ];
                doc.setFont('times','normal'); doc.setFontSize(10);
                bullets.forEach(line => {
                    doc.circle(ML + 1.5, y - 1.2, 0.8, 'F');
                    const wrapped = doc.splitTextToSize(line, CW - 8);
                    doc.text(wrapped, ML + 6, y); y += wrapped.length * 5.5;
                });
            }

            const filename = 'Valuation_' + (v('registration_number')||v('brta_registration_no')||'Report') + '.pdf';
            doc.save(filename);
            UI.showToast('PDF downloaded!', 'success');
        } catch(err) { console.error('PDF error:', err); UI.showToast('PDF failed: ' + err.message, 'error'); }
    }
};
</script>
<script>
let currentUserId = null;
let allSubmissions = [];

async function init() {
    const session = await Auth.requireAuth();
    if (!session) return;
    currentUserId = session.user.id;
    // Sync full_name from auth user_metadata into profiles table
    const metaName = session.user.user_metadata?.full_name;
    if (metaName) {
        await db.from('profiles').upsert({ id: session.user.id, full_name: metaName }, { onConflict: 'id' });
    }
    const profile = await Auth.getProfile(session.user.id);
    document.getElementById('user-name').textContent = profile.full_name || profile.email;
    document.getElementById('banner-name').textContent = (profile.full_name || profile.email).split(' ')[0];
    document.getElementById('avatar-initial').textContent = (profile.full_name || profile.email)[0].toUpperCase();
    if (profile.role === 'admin') document.getElementById('admin-link').style.display = 'inline-flex';
    await loadSubmissions();
}

async function loadSubmissions() {
    const container = document.getElementById('submissions-list');
    container.innerHTML = '<div class="loading-spinner"></div>';
    try {
        const { data, error } = await db.from('submissions').select('*').eq('user_id', currentUserId).order('updated_at', { ascending: false });
        if (error) throw error;
        allSubmissions = data;
        renderCards(data);
    } catch(err) { container.innerHTML = `<div class="error-msg">Failed to load: ${err.message}</div>`; }
}

function renderCards(list) {
    const container = document.getElementById('submissions-list');
    if (list.length === 0) {
        container.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
            <div class="empty-icon">📋</div><h3>No reports yet</h3>
            <p>Start your first car valuation report.</p>
            <a href="form.html" class="btn btn-primary" style="margin-top:0.5rem">Start New Report</a>
        </div>`;
        return;
    }
    container.innerHTML = list.map(sub => {
        const fd = sub.form_data || {};
        const fileRef    = fd.file_reference_number || 'Untitled Report';
        const date       = new Date(sub.updated_at).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
        const sc         = {draft:'status-draft', submitted:'status-submitted', reviewed:'status-reviewed'}[sub.status]||'';
        const sl         = sub.status.charAt(0).toUpperCase()+sub.status.slice(1);
        const letterRef  = fd.letter_ref || '—';
        const referredBy = fd.referred_by || '—';
        return `<div class="submission-card">
            <div class="card-header"><div class="card-title">${fileRef}</div><span class="status-badge ${sc}">${sl}</span></div>
            <div class="card-meta" style="gap:0.4rem;flex-direction:column">
                <span style="display:flex;gap:0.4rem;align-items:center"><span style="color:var(--gray-500);font-size:0.7rem;text-transform:uppercase;letter-spacing:.04em;min-width:90px">Letter Ref</span><span style="font-weight:600;font-size:0.82rem">${letterRef}</span></span>
                <span style="display:flex;gap:0.4rem;align-items:center"><span style="color:var(--gray-500);font-size:0.7rem;text-transform:uppercase;letter-spacing:.04em;min-width:90px">Referred By</span><span style="font-weight:600;font-size:0.82rem">${referredBy}</span></span>
            </div>
            <div class="card-meta" style="margin-top:0.4rem"><span>Updated: ${date}</span></div>
            <div class="card-actions" style="margin-top:1rem">
                <a href="form.html?id=${sub.id}" class="btn btn-sm btn-outline">${sub.status==='draft'?'✏️ Continue':'👁 View'}</a>
                <button class="btn btn-sm btn-primary" onclick="downloadReport('${sub.id}')">📄 PDF</button>
                ${sub.status==='draft'?`<button class="btn btn-sm btn-danger" onclick="deleteSubmission('${sub.id}')">🗑️</button>`:''}
            </div>
        </div>`;
    }).join('');
}

function filterBy(f, btn) {
    document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(f==='all' ? allSubmissions : allSubmissions.filter(s=>s.status===f));
}

async function downloadReport(id) {
    const sub = allSubmissions.find(s=>s.id===id);
    if (sub) { ReportGenerator.generate(sub.form_data); return; }
    const { data } = await db.from('submissions').select('*').eq('id', id).single();
    ReportGenerator.generate(data?.form_data);
}

async function deleteSubmission(id) {
    if (!confirm('Delete this draft?')) return;
    try {
        const { error } = await db.from('submissions').delete().eq('id', id);
        if (error) throw error;
        UI.showToast('Draft deleted', 'success');
        await loadSubmissions();
    } catch(err) { UI.showToast('Error: '+err.message, 'error'); }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
